add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true

[nodejs]
format = "via [⬢ $version](bold green) "
detect_files = ["package.json", ".node-version", ".nvmrc"]

[package]
disabled = true